version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: delivery_db
    ports:
      - "5433:5432"

  batch-service:
    build: .
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://admin:1234@postgres:5432/delivery_db
      ORDER_URL: http://order-service:3001
    depends_on:
      - postgres
